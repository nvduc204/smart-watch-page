
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1125" viewBox="0 0 900 1125" role="img" aria-labelledby="title desc">
  <title id="title">Sport Loop smartwatch screen</title>
  <desc id="desc">A round smartwatch in sport mode with route loop, pace, distance, and heart rate.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#ecfeff"/>
      <stop offset="0.5" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#dcfce7"/>
    </linearGradient>
    <linearGradient id="case" x1="0.1" x2="0.9" y1="0" y2="1">
      <stop stop-color="#f8fafc"/>
      <stop offset="0.42" stop-color="#94a3b8"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="strap" x1="0" x2="1">
      <stop stop-color="#0f172a"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="route" x1="0" x2="1">
      <stop stop-color="#22c55e"/>
      <stop offset="0.55" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="32" stdDeviation="32" flood-color="#0f172a" flood-opacity="0.24"/>
    </filter>
  </defs>
  <rect width="900" height="1125" fill="url(#bg)"/>
  <circle cx="300" cy="350" r="150" fill="#22c55e" opacity="0.1"/>
  <circle cx="640" cy="760" r="190" fill="#38bdf8" opacity="0.1"/>
  <path d="M374 122h152c30 0 54 24 54 54v220H320V176c0-30 24-54 54-54Z" fill="url(#strap)"/>
  <path d="M320 666h260v224c0 30-24 54-54 54H374c-30 0-54-24-54-54V666Z" fill="url(#strap)"/>
  <circle cx="450" cy="530" r="280" fill="url(#case)" filter="url(#shadow)"/>
  <circle cx="450" cy="530" r="245" fill="#020617"/>
  <rect x="702" y="474" width="30" height="112" rx="15" fill="#64748b"/>
  <text x="340" y="360" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">RUN</text>
  <text x="496" y="360" fill="#22c55e" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900" text-anchor="middle">Sport Loop</text>
  <path d="M348 500c0-64 52-116 116-116 54 0 99 37 112 87 12 51-19 103-70 116-36 9-73-2-98-29-20-21-20-55 2-76 24-23 63-16 79 14 10 21 4 47-15 61-29 22-73 5-80-31" fill="none" stroke="#1e293b" stroke-width="32" stroke-linecap="round"/>
  <path d="M348 500c0-64 52-116 116-116 54 0 99 37 112 87 12 51-19 103-70 116-36 9-73-2-98-29-20-21-20-55 2-76 24-23 63-16 79 14 10 21 4 47-15 61-29 22-73 5-80-31" fill="none" stroke="url(#route)" stroke-width="19" stroke-linecap="round"/>
  <circle cx="348" cy="500" r="10" fill="#22c55e"/>
  <circle cx="394" cy="526" r="10" fill="#a855f7"/>
  <g font-family="Inter, Arial, sans-serif">
    <text x="450" y="648" text-anchor="middle" fill="#ffffff" font-size="50" font-weight="900">5.21</text>
    <text x="450" y="678" text-anchor="middle" fill="#bae6fd" font-size="15" font-weight="800" letter-spacing="4">KILOMETERS</text>
    <rect x="314" y="714" width="272" height="42" rx="21" fill="#ffffff" opacity="0.08"/>
    <text x="342" y="742" fill="#e2e8f0" font-size="16" font-weight="800">Pace</text>
    <text x="552" y="742" fill="#38bdf8" font-size="16" font-weight="900" text-anchor="end">4'38"</text>
    <rect x="314" y="768" width="272" height="42" rx="21" fill="#ffffff" opacity="0.08"/>
    <text x="342" y="796" fill="#e2e8f0" font-size="16" font-weight="800">Heart</text>
    <text x="552" y="796" fill="#fb7185" font-size="16" font-weight="900" text-anchor="end">142 bpm</text>
  </g>
</svg>
