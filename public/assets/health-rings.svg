
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1125" viewBox="0 0 900 1125" role="img" aria-labelledby="title desc">
  <title id="title">AI Health Rings smartwatch screen</title>
  <desc id="desc">A round smartwatch showing colorful AI health activity rings and health metrics.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#e0f2fe"/>
      <stop offset="0.5" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="case" x1="0.1" x2="0.9" y1="0" y2="1">
      <stop stop-color="#f8fafc"/>
      <stop offset="0.45" stop-color="#94a3b8"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#020617"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="ringA" x1="0" x2="1">
      <stop stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="ringB" x1="0" x2="1">
      <stop stop-color="#a855f7"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="ringC" x1="0" x2="1">
      <stop stop-color="#34d399"/>
      <stop offset="1" stop-color="#bef264"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="32" stdDeviation="32" flood-color="#0f172a" flood-opacity="0.24"/>
    </filter>
  </defs>
  <rect width="900" height="1125" fill="url(#bg)"/>
  <circle cx="450" cy="480" r="300" fill="#38bdf8" opacity="0.12"/>
  <circle cx="675" cy="295" r="150" fill="#a855f7" opacity="0.12"/>
  <path d="M374 122h152c30 0 54 24 54 54v220H320V176c0-30 24-54 54-54Z" fill="#64748b"/>
  <path d="M320 666h260v224c0 30-24 54-54 54H374c-30 0-54-24-54-54V666Z" fill="#64748b"/>
  <circle cx="450" cy="530" r="280" fill="url(#case)" filter="url(#shadow)"/>
  <circle cx="450" cy="530" r="245" fill="url(#screen)"/>
  <rect x="702" y="474" width="30" height="112" rx="15" fill="#64748b"/>
  <text x="342" y="360" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">09:41</text>
  <text x="526" y="360" fill="#38bdf8" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">AI</text>
  <circle cx="450" cy="512" r="116" fill="none" stroke="#1e293b" stroke-width="23"/>
  <circle cx="450" cy="512" r="116" fill="none" stroke="url(#ringA)" stroke-width="23" stroke-linecap="round" stroke-dasharray="580 729" transform="rotate(-90 450 512)"/>
  <circle cx="450" cy="512" r="80" fill="none" stroke="#1e293b" stroke-width="21"/>
  <circle cx="450" cy="512" r="80" fill="none" stroke="url(#ringB)" stroke-width="21" stroke-linecap="round" stroke-dasharray="377 503" transform="rotate(-90 450 512)"/>
  <circle cx="450" cy="512" r="48" fill="none" stroke="#1e293b" stroke-width="18"/>
  <circle cx="450" cy="512" r="48" fill="none" stroke="url(#ringC)" stroke-width="18" stroke-linecap="round" stroke-dasharray="236 302" transform="rotate(-90 450 512)"/>
  <text x="450" y="504" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="900">87</text>
  <text x="450" y="538" text-anchor="middle" fill="#bae6fd" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="3">RECOVERY</text>
  <g font-family="Inter, Arial, sans-serif" font-weight="800">
    <rect x="314" y="662" width="272" height="42" rx="21" fill="#ffffff" opacity="0.08"/>
    <text x="342" y="690" fill="#e2e8f0" font-size="16">Heart</text>
    <text x="552" y="690" fill="#34d399" font-size="16" text-anchor="end">68 bpm</text>
    <rect x="314" y="716" width="272" height="42" rx="21" fill="#ffffff" opacity="0.08"/>
    <text x="342" y="744" fill="#e2e8f0" font-size="16">Sleep</text>
    <text x="552" y="744" fill="#38bdf8" font-size="16" text-anchor="end">7h 42m</text>
  </g>
</svg>
